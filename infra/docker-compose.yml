services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
    ports:
      - "5432:5432"
    volumes:
      - radar_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  radar_postgres:
